<!DOCTYPE html>
<html>
  <head>
    <meta content='IE=edge' http-equiv='X-UA-Compatible'>
    <meta charset='utf-8'>
    <meta content='width=device-width, user-scalable=no, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0' name='viewport'>
    <meta http-equiv="Expires" content="0" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta name="format-detection" content="telephone=no" />    
    <title>Potable Water</title>

    <!-- css load -->
    <link href="../../css/common.css" rel="stylesheet" />
    <link href="../../css/style.css" rel="stylesheet" />
    <link href="../../css/style_2.css" rel="stylesheet" />
    <link href="../../css/atab.css" rel="stylesheet" />
    <!-- //css load -->

    <!-- js load -->
    <script src='../../js/jquery-3.3.1.min.js'></script>
    <!-- <script src='../../js/jquery.simple-sidebar.min.js'></script> -->
    <!--<script src='../../js/jquery-ui.min.js'></script>-->
    <script src='../../js/common.js'></script> 
    <!--// js load -->
   
    <!--[if lt IE 9]>
      <script src='../../js/html5shiv.min.js'></script>
    <![endif]-->

  <script>

    //리포트 공통 스크립트 
    $(function(){
        //crew search list 개별 선택/해제
        $(".crew_srch_popup .crew_srch_list > li").click(function(){
            if($(this).hasClass("selected")){
                $(this).removeClass("selected");
            }else{
                $(this).addClass("selected");
            }
        });

        //crew search list 전체 선택/해제
        $(".crew_srch_popup .crew_all_btn").click(function(){
            if($("#crew_all").is(":checked")){
                $(".crew_srch_popup .crew_srch_list > li").removeClass("selected");
            }else{
                $(".crew_srch_popup .crew_srch_list > li").addClass("selected");
            }
        });
        
        //리스트 삭제
        $(".rpt_pax_list .del_list_btn").click(function(){
            $(this).parent('li').remove();
        });
    });
  </script>  
  </head>
  <body>
    <section class="container white_bg" >   

    <!-- header-->
    <header class="rpt_header">
        <a class="back_btn"></a>
        <h2>Potable Water</h2>
    </header>
    <div class="sub_header rpt_flt_info">
        <img src="../../images/icon/icon_fly_gray.svg" alt="icon_plane">FLT INFO
        <span>OZ 1234</span>/
        <span>A321-200</span>/
        <span>HL8060</span>/
        <span>ICN-KIX</span>
    </div>

    <!-- contents -->
    <div class="contents" id="contents">

        <!--water report -->
        <div class="rpt_water_wrap">
            <!-- 출발 -->
            <!-- <h1 class="tit"><img src="../../images/icon/icon_dep.svg" alt="departure icon">Departure</h1> -->
            <!-- 도착 -->
            <h1 class="tit">
                <img src="../../images/icon/icon_arr.svg" alt="departure icon">Arrival
                <p class="border_btn ml_a">← DEP</p>
            </h1>
            <!-- <div class="tit_sub">Water Gauge</div> -->

            <!-- gauge 입력 부 -->
            <div class="gauge_area">

                
                <div class="input_controls">
                    <img src="../../images/icon/icon_water_fly.svg" alt="icon_departure">
                    <div class="tit_sub">Water Gauge</div>
                    <div id="percentageWrapper" class="input_wrap">
                        <input type="number" 
                            id="percentageInput" 
                            class="percentage-box" 
                            min="0" 
                            max="100" 
                            value="90" 
                            pattern="[0-9]*" 
                            inputmode="decimal">
                        <span>%</span>
                    </div>
                    <button id="btnUp" class="arrow_btn"></button>
                    <button id="btnDown" class="arrow_btn"></button>
                </div>
                

                <div class="gauge">
                     <div class="label">
                        <span>100%</span><span></span>
                        <span>90%</span><span></span>
                        <span>80%</span><span></span>
                        <span>70%</span><span></span>
                        <span>60%</span><span></span>
                        <span>50%</span><span></span>
                        <span>40%</span><span></span>
                        <span>30%</span><span></span>
                        <span>20%</span><span></span>
                        <span>10%</span><span></span>
                        <span>0%</span>
                    </div>

                    <div class="gauge_wrapper">
                        <div id="gaugeRail" class="gauge_rail"> 
                            <div id="gaugeFill" class="gauge_fill"></div>
                        </div>
                    </div>

                     <div class="label">
                        <span>Full</span><span></span>
                        <span>7/8</span><span></span>
                        <span>3/4</span><span></span>
                        <span>5/8</span><span></span>
                        <span>1/2</span><span></span>
                        <span>3/8</span><span></span>
                        <span>1/4</span><span></span>
                        <span>1/8</span><span></span>
                        <span>Empty</span>
                    </div>

                </div>
                
            </div>

            <!-- 게이지 정보 표출 -->
            <div class="gauge_display">
                <div class="info_wrap active">
                    <span>DEP</span>
                    <span id="depPercentage" class="percentage">90%</span>
                </div>
                <!-- <div class="info_wrap active">
                    <span>ARR</span>
                    <span id="depPercentage" class="percentage">90%</span>
                </div>
                <div class="info_wrap usage">
                    <span>USAGE</span>
                    <span id="depPercentage" class="percentage">90%</span>
                </div> -->
            </div>


        </div>
       
        <!-- delete ,save button-->
        <div class="report_btn_box rpt_form" >
            <p><img src="../../images/icon/icon_delete_b_w.svg" alt="icon_delete"> DELETE</p>
            <p><img src="../../images/icon/icon_save_noborder.svg" alt="icon_save"> SAVE</p>
        </div>
        <!-- delete ,save button--> 
    </div>
    <!-- //contents -->
    </section>

    <!-- water gauge -->
   <script>
$(document).ready(function () {
    let currentPercentage = 90;
    let isDragging = false;
    const $gaugeFill = $('#gaugeFill');
    const $gaugeRail = $('#gaugeRail');
    const $percentageInput = $('#percentageInput');

    function updateGauge(percentage) {
        percentage = Math.max(0, Math.min(100, percentage));
        currentPercentage = percentage;

        $gaugeFill.css('height', percentage + '%');
        $percentageInput.val(percentage);
        $('#depPercentage').text(percentage + '%');
    }

    updateGauge(currentPercentage);

    /* ==========================================================
       1. 게이지 드래그
    ========================================================== */
    let railOffsetTop;
    let railHeight;

    function startDrag(clientY) {
        isDragging = true;
        $gaugeFill.css('transition', 'none');

        railOffsetTop = $gaugeRail.offset().top;
        railHeight = $gaugeRail.height();
    }

    function onDrag(clientY) {
        if (!isDragging) return;

        const mouseYRelative = clientY - railOffsetTop;
        const inverted = railHeight - mouseYRelative;
        const ratio = Math.max(0, Math.min(1, inverted / railHeight));

        updateGauge(Math.round(ratio * 100));
    }

    function endDrag() {
        isDragging = false;
        $gaugeFill.css('transition', 'height 0.3s ease');
    }

    $gaugeRail.on('mousedown', function (e) {
        e.preventDefault();
        startDrag(e.clientY);
    });

    $(document).on('mousemove', function (e) {
        onDrag(e.clientY);
    });

    $(document).on('mouseup', endDrag);

    $gaugeRail.on('touchstart', function (e) {
        startDrag(e.originalEvent.touches[0].clientY);
    });

    $(document).on('touchmove', function (e) {
        if (isDragging) e.preventDefault();
        onDrag(e.originalEvent.touches[0].clientY);
    });

    $(document).on('touchend', endDrag);


    /* ==========================================================
       2. UP/DOWN 버튼 + Auto Repeat + Active 클래스
    ========================================================== */
    let repeatTimer;
    const repeatInterval = 100;
    const initialDelay = 400;

    function changePercentage(delta) {
        updateGauge(currentPercentage + delta);
    }

    function startRepeat(delta, $btn) {
        $btn.addClass('btn--pressed'); 
        changePercentage(delta);

        repeatTimer = setTimeout(() => {
            clearTimeout(repeatTimer);
            repeatTimer = setInterval(() => {
                changePercentage(delta);
            }, repeatInterval);
        }, initialDelay);
    }

    function stopRepeat() {
        clearTimeout(repeatTimer);
        clearInterval(repeatTimer);
        repeatTimer = null;

        $('#btnUp, #btnDown').removeClass('btn--pressed');
    }

    $('#btnUp').on('mousedown touchstart', function (e) {
        if (e.type === 'touchstart') e.preventDefault();
        startRepeat(1, $(this));
    });

    $('#btnDown').on('mousedown touchstart', function (e) {
        if (e.type === 'touchstart') e.preventDefault();
        startRepeat(-1, $(this));
    });

    $(document).on('mouseup touchend', stopRepeat);

    $('#btnUp, #btnDown').on('mouseleave touchcancel', function () {
        $(this).removeClass('btn--pressed');
        stopRepeat();
    });


    /* ==========================================================
       3. 인풋 직접 입력 처리
    ========================================================== */

    $('#percentageWrapper').on('click', function () {
        $percentageInput.focus();
    });

    $percentageInput.on('focus', function () {
        $(this).select();
        $('#percentageWrapper').addClass('is_focused');
    });

    $percentageInput.on('blur', function () {
        $('#percentageWrapper').removeClass('is_focused');
    });

    $percentageInput.on('change', function () {
        let val = parseInt($(this).val());

        if (isNaN(val) || val < 0 || val > 100) {
            alert('0~100 사이 숫자를 입력해주세요.');
            $(this).val(currentPercentage);
        } else {
            updateGauge(val);
        }
    });


    /* ==========================================================
       4. 갤럭시탭: 복사/공유/모두선택/웹검색/사전 팝업 차단
    ========================================================== */

    // 텍스트 선택 차단
    $percentageInput.on('selectstart', function (e) {
        e.preventDefault();
        return false;
    });

    // 길게 누르기 차단
    $percentageInput.on('touchstart', function (e) {
        e.preventDefault();
        this.focus({ preventScroll: true });
    });

    // 마우스 길게 누르기 차단
    $percentageInput.on('mousedown', function (e) {
        e.preventDefault();
        this.focus();
    });

    // Android Chrome 컨텍스트 메뉴 차단
    $percentageInput.on('contextmenu', function (e) {
        e.preventDefault();
        return false;
    });

    // CSS 수준에서도 선택 방지
    $percentageInput.css({
        'user-select': 'none',
        '-webkit-user-select': 'none',
        '-webkit-touch-callout': 'none',
        'touch-action': 'manipulation'
    });
});

</script>

<!-- water gauge -->


  </body>
</html>
